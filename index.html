<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Flipkart Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f3f6;
}

/* Navbar */
.navbar{
    background:#2874f0;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search-box input{
    width:400px;
    padding:8px;
    border:none;
    border-radius:3px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

/* Banner */
.banner{
    background:url('https://via.placeholder.com/1200x250') no-repeat center;
    background-size:cover;
    height:250px;
    margin:10px;
    border-radius:5px;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:8px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    margin:10px 0;
}

.price{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    background:#ff9f00;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#fb641b;
}

/* Footer */
footer{
    background:#172337;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Flipkart</div>

    <div class="search-box">
        <input type="text" placeholder="Search for products">
    </div>

    <div class="nav-links">
        <a href="#">Login</a>
        <a href="#">Cart</a>
        <a href="#">Orders</a>
    </div>
</div>

<!-- Banner -->
<div class="banner"></div>

<!-- Products -->
<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/220x180" alt="">
        <h3>Smartphone</h3>
        <div class="price">₹14,999</div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/220x180" alt="">
        <h3>Laptop</h3>
        <div class="price">₹49,999</div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/220x180" alt="">
        <h3>Headphones</h3>
        <div class="price">₹1,999</div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/220x180" alt="">
        <h3>Watch</h3>
        <div class="price">₹2,499</div>
        <button>Add to Cart</button>
    </div>

</div>

<!-- Footer -->
<footer>
    © 2026 Flipkart Clone | Made with HTML & CSS
</footer>

</body>
</html>
